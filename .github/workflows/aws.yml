name: Deploy to EC2 (Multi-target)

on:
  push:
    branches:
      - main
      - staging
      - develop
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') && 'production' || github.ref_name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref }}" == refs/tags/* ]]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "target_port=80" >> $GITHUB_OUTPUT
            echo "container_name=todo-api" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "image_tag=staging" >> $GITHUB_OUTPUT
            echo "target_port=8080" >> $GITHUB_OUTPUT
            echo "container_name=todo-api-staging" >> $GITHUB_OUTPUT
            echo "env_name=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "image_tag=develop" >> $GITHUB_OUTPUT
            echo "target_port=8081" >> $GITHUB_OUTPUT
            echo "container_name=todo-api-develop" >> $GITHUB_OUTPUT
            echo "env_name=develop" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_NAME: ghcr.io/robertheo15/todo-api
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag || github.sha }}
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Deploying ${{ steps.vars.outputs.container_name }} (${{ steps.vars.outputs.image_tag }})..."
            sudo docker pull ghcr.io/robertheo15/todo-api:${{ steps.vars.outputs.image_tag }}
            sudo docker stop ${{ steps.vars.outputs.container_name }} || true
            sudo docker rm ${{ steps.vars.outputs.container_name }} || true
            sudo docker run \
              -d \
              --name ${{ steps.vars.outputs.container_name }} \
              -p ${{ steps.vars.outputs.target_port }}:3000 \
              ghcr.io/robertheo15/todo-api:${{ steps.vars.outputs.image_tag }}
            echo "Deployed on port ${{ steps.vars.outputs.target_port }}"
