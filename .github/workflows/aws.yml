name: Deploy to EC2 (Docker)

on:
  push:
    branches:
      - main
      
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/robertheo15/todo-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
      - name: Debug secrets (temporary)
        run: |
          echo "EC2_HOST is set: ${{ secrets.EC2_HOST != '' }}"
          echo "EC2_USERNAME is set: ${{ secrets.EC2_USERNAME != '' }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Pulling new image..."
            sudo docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            
            echo "Stopping old container..."
            sudo docker stop todo-api || true
            sudo docker rm todo-api || true
            
            echo "Starting new container..."
            sudo docker run \
              -d \
              --name todo-api \
              -p 80:3000 \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            
            echo "Done!"

