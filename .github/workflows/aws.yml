name: Deploy to EC2 (Docker)

on:
  push:
    branches:
      - main
      
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/robertheo15/todo-api
  IMAGE_TAG: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') && 'latest' || github.ref_name || github.sha }}
  TARGET_PORT: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') && '80' || '8080' }}
  CONTAINER_NAME: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') && 'todo-api' || format('todo-api-{0}', github.ref_name) }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ${{ env.IMAGE_TAG }} via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Deploying to ${{ env.IMAGE_TAG }}..."
            sudo docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true
            sudo docker run \
              -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p ${{ env.TARGET_PORT }}:3000 \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            echo "Deployed ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} on port ${{ env.TARGET_PORT }}"

